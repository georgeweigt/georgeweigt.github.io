<!DOCTYPE html><html><body><script src="https://georgeweigt.github.io/eigenmath.js"></script><textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:1em">
"Harmonic oscillator 1"

psi(n) = C(n) exp(m omega x^2 / (2 hbar) - i omega t (n + 1/2)) *
         d(exp(-m omega x^2 / hbar), x, n)

C(n) = 1 / sqrt(2^n n!) (m omega / (pi hbar))^(1/4)

"Verify wave functions solve Schrodinger equation"

for(n,0,4,
 Psi = psi(n),
 check(i hbar d(Psi,t) == -hbar^2 / (2 m) d(Psi,x,x) + 1/2 m omega^2 x^2 Psi)
)

"ok"

"Verify for time-independent Schrodinger equation"

psi(n) = C(n) exp(m omega x^2 / (2 hbar)) *
         d(exp(-m omega x^2 / hbar), x, n)

E(n) = hbar omega (n + 1/2)

for(n,0,4,
 Psi = psi(n),
 check(-hbar^2 / (2 m) d(Psi,x,x) + 1/2 m omega^2 x^2 Psi == E(n) Psi)
)

"ok"
