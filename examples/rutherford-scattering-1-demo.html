<!DOCTYPE html><html><body><script src="https://georgeweigt.github.io/eigenmath.js"></script><textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:1em">
"Rutherford scattering 1"

"Verify equation (1)"
f = exp(i p r / hbar - epsilon r) - exp(-i p r / hbar - epsilon r)
F = integral(f,r)
I = 0 - eval(F,r,0)
check(I == -1 / (i p / hbar - epsilon) - 1 / (i p / hbar + epsilon))
"ok"

"Verify equation (2)"
epsilon = 0
f = -m Z alpha c / hbar hbar / (i p) I
check(f == -2 m Z alpha hbar c / p^2)
p = sqrt(4 m E (1 - cos(theta)))
dsigma = conj(f) f
check(dsigma == (Z alpha hbar c / (2 E (1 - cos(theta))))^2)
"ok"

"Verify equation (3)"
check(dsigma == (Z alpha hbar c / (2 E))^2 / (4 sin(theta/2)^4))
"ok"
</textarea> <button onclick="run()">Run</button><br><div id="stdout"></div></body></html>
