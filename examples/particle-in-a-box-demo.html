<!DOCTYPE html><html><body><script src="https://georgeweigt.github.io/eigenmath.js"></script><textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:1em">
"Particle in a box"

psi = (A sin(k x) + B cos(k x)) exp(-i omega t)
omega = hbar k^2 / (2 m)

"Verify Schrodinger equation"
check(i hbar d(psi,t) == -hbar^2 / (2 m) d(psi,x,x))
"ok"

"Verify boundary conditions"
B = 0
k = pi / a
check(eval(psi,x,0) == 0)
check(eval(psi,x,a) == 0)
"ok"

"Verify normalization"
A = sqrt(2 / a)
check(defint(conj(psi) psi, x, 0, a) == 1)
"ok"
</textarea> <button onclick="run()">Run</button><br><div id="stdout"></div></body></html>
