<!DOCTYPE html><html><body><script src="https://georgeweigt.github.io/eigenmath.js"></script><textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:1em">
"Time-independent Schrodinger equation"

H(f) = -hbar^2 / (2 m) d(f,x,x) + 1/2 m omega^2 x^2 f

psi(n) = C(n) exp(-i E(n) t / hbar) *
         exp(m omega x^2 / (2 hbar)) *
         d(exp(-m omega x^2 / hbar), x, n)

C(n) = (-1)^n / sqrt(2^n n!) *
       (m omega / (pi hbar))^(1/4) *
       (hbar / (m omega))^(n/2)

E(n) = hbar omega (n + 1/2)

psi0 = psi(0)
psi1 = psi(1)
psi2 = psi(2)
psi3 = psi(3)
psi4 = psi(4)

E0 = E(0)
E1 = E(1)
E2 = E(2)
E3 = E(3)
E4 = E(4)

check(i hbar d(psi0,t) == H(psi0))
check(i hbar d(psi1,t) == H(psi1))
check(i hbar d(psi2,t) == H(psi2))
check(i hbar d(psi3,t) == H(psi3))
check(i hbar d(psi4,t) == H(psi4))

check(E0 psi0 == H(psi0))
check(E1 psi1 == H(psi1))
check(E2 psi2 == H(psi2))
check(E3 psi3 == H(psi3))
check(E4 psi4 == H(psi4))

"ok"
</textarea> <button onclick="run()">Run</button><br><div id="stdout"></div></body></html>
